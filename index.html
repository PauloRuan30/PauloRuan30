<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>poru@poru-nitro05 ~</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a0a;
            color: #d4d4d4;
            font-family: 'Courier New', Courier, monospace;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            /* Efeito de scanline sutil do Nier */
            background-image: repeating-linear-gradient(
                0deg,
                transparent,
                transparent 2px,
                rgba(255, 255, 255, 0.03) 2px,
                rgba(255, 255, 255, 0.03) 4px
            );
        }

        .container {
            display: flex;
            gap: 40px;
            align-items: flex-start;
            max-width: 1200px;
            width: 100%;
            flex-wrap: wrap;
            justify-content: center;
        }

        .nier-gif {
            width: 460px;
            border-radius: 12px;
            border: 1px solid #333;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.8);
            filter: grayscale(20%) contrast(1.1);
            transition: filter 0.3s;
        }

        .nier-gif:hover {
            filter: grayscale(0%) contrast(1.2);
        }

        .terminal-container {
            background: #111;
            border: 1px solid #333;
            border-radius: 8px;
            box-shadow: 
                0 0 0 1px #000,
                0 20px 50px rgba(0, 0, 0, 0.8),
                inset 0 0 100px rgba(0, 0, 0, 0.5);
            max-width: 600px;
            width: 100%;
            position: relative;
            overflow: hidden;
        }

        /* Efeito de brilho do CRT */
        .terminal-container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(
                ellipse at center,
                transparent 0%,
                rgba(0, 0, 0, 0.4) 100%
            );
            pointer-events: none;
        }

        .terminal-header {
            background: #1a1a1a;
            padding: 10px 15px;
            border-bottom: 1px solid #333;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 12px;
            color: #666;
        }

        .terminal-btn {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            border: 1px solid #333;
        }

        .btn-close { background: #444; }
        .btn-min { background: #333; }
        .btn-max { background: #333; }

        .terminal-body {
            padding: 25px;
            font-size: 14px;
            line-height: 1.6;
            min-height: 350px;
            position: relative;
        }

        .line {
            margin-bottom: 4px;
            opacity: 0;
            animation: fadeIn 0.1s forwards;
            white-space: pre-wrap;
            word-break: break-all;
        }

        .prompt-user { color: #888; }
        .prompt-host { color: #aaa; }
        .prompt-path { color: #666; }
        .command { color: #fff; }
        .output { color: #bbb; }
        .label { color: #888; }
        
        a {
            color: #fff;
            text-decoration: none;
            border-bottom: 1px solid #555;
            transition: all 0.3s;
            position: relative;
        }

        a:hover {
            color: #fff;
            border-bottom-color: #fff;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
        }

        .cursor {
            display: inline-block;
            width: 8px;
            height: 16px;
            background: #fff;
            animation: blink 1s infinite;
            vertical-align: middle;
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
        }

        @keyframes blink {
            0%, 50% { opacity: 1; }
            51%, 100% { opacity: 0; }
        }

        @keyframes fadeIn {
            to { opacity: 1; }
        }

        /* Responsividade */
        @media (max-width: 808px) {
            .container {
                flex-direction: column;
                align-items: center;
            }
            .nier-gif {
                width: 470px;
            }
        }

        /* Modo preto e branco puro forçado (opcional) */
        @media (prefers-color-scheme: dark) {
            body {
                background: #050505;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <img src="https://raw.githubusercontent.com/PauloRuan30/PauloRuan30/main/nier-brother-nier.gif"
         alt="Nier Brother GIF"
         class="nier-gif">

    <div class="terminal-container">

        <div class="terminal-body" id="terminal">
            <!-- Conteúdo gerado via JS -->
        </div>
    </div>
</div>

<script>
const lines = [
    { text: "poru@poru-acer ~ $ neofetch", type: "command", delay: 800 },
    { text: "", delay: 200 },
    { text: "poru@poru", type: "title", delay: 100 },
    { text: "─────────────────", type: "separator", delay: 50 },
    { text: "OS: EndeavourOS Linux", type: "info", delay: 50 },
    { text: "Host: Nitro AN515", type: "info", delay: 50 },
    { text: "Kernel: 6.x arch", type: "info", delay: 50 },
    { text: "Shell: bash", type: "info", delay: 50 },
    { text: "", delay: 100 },
    { text: "Pronouns: He/Him", type: "info", delay: 50 },
    { text: "Location: Fortaleza, Brazil", type: "info", delay: 50 },
    { text: "Languages: Portuguese (native), English (fluent)", type: "info", delay: 50 },
    { text: "Hobbies: Taking some pictures, Coding, Gaming, Gardening", type: "info", delay: 50 },
    { text: "", delay: 150 },
    { text: "LinkedIn: ", type: "label", link: { text: "Click here to see my linkedin", url: "https://www.linkedin.com/in/paulo-ruan-oliveira-barbosa/" }, delay: 100 },
    { text: "Email: ", type: "label", link: { text: "PauloRuan_30@outlook.com", url: "mailto:PauloRuan_30@outlook.com" }, delay: 100 },
    { text: "Portfolio: ", type: "label", link: { text: "seusite.com", url: "https://seusite.com" }, delay: 100 },
    { text: "", delay: 300 },
    { text: "poru@poru-acer ~ $ ", type: "prompt", cursor: true, delay: 0 }
];

const terminal = document.getElementById('terminal');

async function typeTerminal() {
    for (let line of lines) {
        const div = document.createElement('div');
        div.className = 'line';
        
        switch(line.type) {
            case 'command':
                div.innerHTML = `<span class="prompt-user">poru</span>@<span class="prompt-host">poru-acer</span> <span class="prompt-path">~</span> $ <span class="command">${line.text.replace('poru@poru-acer ~ $ ', '')}</span>`;
                break;
            case 'title':
                div.innerHTML = `<span style="color: #fff; font-weight: bold;">${line.text}</span>`;
                break;
            case 'separator':
                div.innerHTML = `<span style="color: #444;">${line.text}</span>`;
                break;
            case 'info':
                const [label, value] = line.text.split(': ');
                div.innerHTML = `<span class="label">${label}:</span> <span class="output">${value || ''}</span>`;
                break;
            case 'label':
                div.innerHTML = `<span class="label">${line.text}</span>`;
                if (line.link) {
                    const a = document.createElement('a');
                    a.href = line.link.url;
                    a.textContent = line.link.text;
                    a.target = "_blank";
                    div.appendChild(a);
                }
                break;
            case 'prompt':
                div.innerHTML = `<span class="prompt-user">poru</span>@<span class="prompt-host">poru-acer</span> <span class="prompt-path">~</span> $ `;
                if (line.cursor) {
                    const cursor = document.createElement('span');
                    cursor.className = 'cursor';
                    div.appendChild(cursor);
                }
                break;
        }
        
        terminal.appendChild(div);
        
        // Scroll automático
        terminal.scrollTop = terminal.scrollHeight;
        
        await new Promise(r => setTimeout(r, line.delay));
    }
}

// Iniciar animação quando a página carregar
window.addEventListener('load', typeTerminal);

// Efeito de glitch aleatório (estilo Nier)
setInterval(() => {
    if (Math.random() > 0.95) {
        terminal.style.textShadow = '2px 0 0 rgba(255,0,0,0.5), -2px 0 0 rgba(0,255,255,0.5)';
        setTimeout(() => {
            terminal.style.textShadow = 'none';
        }, 100);
    }
}, 5000);
</script>

</body>
</html>
